name: Weekly CLI Health Check

on:
  schedule:
    - cron: '0 5 * * 1'  # Every Monday at 5am UTC
  workflow_dispatch:
  push:
    branches:
      - ci-test

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies and Chromium
        run: npm ci

      - name: Run CLI health check
        run: npm test
